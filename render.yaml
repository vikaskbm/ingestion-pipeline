# Render Blueprint - AI Agent Evaluation Pipeline
# Deploy: Connect repo and apply this blueprint

databases:
  - name: eval-db
    databaseName: eval
    plan: free

services:
  - type: keyvalue
    name: eval-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all

  - type: web
    name: eval-backend
    runtime: docker
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eval-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: eval-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: eval-redis
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: OPENAI_API_KEY
        sync: false
